<!DOCTYPE html>
<html>
<head>
  <title>Estudar Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f0ff;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:white;
      padding:30px;
      border-radius:20px;
      width:300px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
    }

    h1{
      color:#6a4cff;
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#6a4cff;
      color:white;
      font-size:16px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🌸 Estudar</h1>

  <input type="text" placeholder="Full Name">

  <input type="email" placeholder="Email">

  <input type="password" placeholder="Password">

  <button>Create Account</button>

  <p>Already have an account?</p>

  <a href="login.html">Login</a>
</div>

</body>
</html>
