<!DOCTYPE html>
<html>
<head>
  <title>Estudar Login</title>
</head>

<body>
  <h2>Login to Estudar</h2>

  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button onclick="login()">Login</button>

  <p id="msg"></p>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, signInWithEmailAndPassword } from "firebase/auth";

    // 🔮 Firebase config (same as signup)
    const firebaseConfig = {
      apiKey: "AIzaSyAlSwMiKfuKusL1vEvpsxYzulA4KlLoqCE",
      authDomain: "estudar-tutor.firebaseapp.com",
      projectId: "estudar-tutor",
      appId: "1:1006786778303:web:b9aa20b4ce8a9b255b220a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 🌙 Login function
    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          document.getElementById("msg").innerText = "Login successful ✨";

          // redirect to dashboard
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          document.getElementById("msg").innerText = error.message;
        });
    };
  </script>
</body>
</html>
